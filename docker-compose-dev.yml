# Development docker-compose with live reload
# Use: "make local-live" to start with live reload

networks:
  eln:

services:
  postgres:
    image: postgres:15-alpine
    container_name: eln-postgres-dev
    restart: always
    environment:
      - POSTGRES_DB=eln
      - POSTGRES_USER=eln
      - POSTGRES_PASSWORD=eln
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./src/sql/structure.sql:/docker-entrypoint-initdb.d/01-structure.sql:ro
    networks:
      - eln
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eln -d eln"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: eln-minio-dev
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - ./data/minio:/data
    networks:
      - eln
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s

  eln-community-dev:
    image: ghcr.io/deltablot/eln-community:latest
    container_name: eln-community-dev
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SITE_URL=http://localhost:8080
      - DEV=1
      - ORCID_CLIENT_SECRET=
      - ORCID_CLIENT_ID=
      - DATABASE_URL=postgres://eln:eln@postgres:5432/eln?sslmode=disable
      - BUCKET_NAME=eln-bucket
      - REGION=us-east-1
      - MAX_FILE_SIZE_MB=100
      - ACCESS_KEY=minioadmin
      - SECRET_KEY=minioadmin
      - S3_ENDPOINT=http://minio:9000
    networks:
      - eln
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

