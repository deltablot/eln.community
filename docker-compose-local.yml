# deploy eln.community service
# use: "docker compose up -d" to start service
networks:
  eln:

services:
  postgres:
    image: postgres:15-alpine
    container_name: eln-postgres
    restart: always
    environment:
      - POSTGRES_DB=eln
      - POSTGRES_USER=eln
      - POSTGRES_PASSWORD=eln
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/sql/structure.sql:/docker-entrypoint-initdb.d/01-structure.sql:ro
    networks:
      - eln
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eln -d eln"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  eln-community:
    image: ghcr.io/deltablot/eln-community:latest
    container_name: eln-community
    security_opt:
        - no-new-privileges:true
    restart: always
    ports:
      - "8080:8080"
    environment:
        - SITE_URL=https://eln.community
        - DEV=0
        - ORCID_CLIENT_SECRET=
        - ORCID_CLIENT_ID=
        - DATABASE_URL=postgres://eln:eln@postgres:5432/eln?sslmode=disable
        - BUCKET_NAME=
        - REGION=fr-par
        - MAX_FILE_SIZE_MB=100
        - ACCESS_KEY=
        - SECRET_KEY=
    networks:
      - eln
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
