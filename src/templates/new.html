{{ define "content" }}
<div class="toast-container position-fixed top-0 end-0 p-3">
  <div id="successToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header">
      <strong class="me-auto text-success">Success</strong>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body">
      Your entry has been successfully uploaded!
    </div>
  </div>
  <div id="errorToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header">
      <strong class="me-auto text-danger">Error</strong>
      <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
    <div class="toast-body" id="errorToastBody">
      Upload failed. Please try again.
    </div>
  </div>
</div>
<h1>Upload an Entry</h1>
<p>Share your ELN archives: experiments, protocols, templates, resources...</p>
<form method='post' action='/api/v1/records' enctype='multipart/form-data'>
  {{ if .Categories }}
  <label class="form-label fw-bold">Select categories
    <input type="hidden" name="categories" id="selected-categories-input"/>
    <div class="category-multiselect mt-2" id="categoryMultiselect">
      <div class="category-multiselect-input" id="categoryMultiselectInput">
        <div class="category-multiselect-tags" id="categoryMultiselectTags"></div>
        <span class="category-multiselect-placeholder" id="categoryMultiselectPlaceholder">Select categories...</span>
        <span class="category-multiselect-arrow">▼</span>
      </div>
      <div class="category-multiselect-dropdown d-none" id="categoryMultiselectDropdown">
        <div class="category-multiselect-search">
          <input type="text" class="form-control form-control-sm" id="new-category-search"
                 placeholder="Search categories..."/>
        </div>
        <div class="category-multiselect-options" id="new-category-tree">
          <ul class="category-tree">
            {{ range .Categories }}
            <li class="category-tree-item">
              <div class="category-item" data-category-id="{{ .Id }}" data-category-name="{{ .Name }}">
                <input type="checkbox" class="category-checkbox"/>
                {{- if .Subcategories }}
                <span class="category-toggle"></span>
                {{- else }}
                <span class="category-toggle no-children"></span>
                {{- end }}
                <span class="category-name">{{ .Name }}</span>
              </div>
              {{- if .Subcategories }}
              <ul class="category-children">
                {{- range .Subcategories }}
                <li class="category-tree-item">
                  <div class="category-item" data-category-id="{{ .Id }}" data-category-name="{{ .Name }}">
                    <input type="checkbox" class="category-checkbox"/>
                    {{- if .Subcategories }}
                    <span class="category-toggle"></span>
                    {{- else }}
                    <span class="category-toggle no-children"></span>
                    {{- end }}
                    <span class="category-name">{{ .Name }}</span>
                  </div>
                  {{- if .Subcategories }}
                  <ul class="category-children">
                    {{- range .Subcategories }}
                    <li class="category-tree-item">
                      <div class="category-item" data-category-id="{{ .Id }}" data-category-name="{{ .Name }}">
                        <input type="checkbox" class="category-checkbox"/>
                        <span class="category-toggle no-children"></span>
                        <span class="category-name">{{ .Name }}</span>
                      </div>
                    </li>
                    {{- end }}
                  </ul>
                  {{- end }}
                </li>
                {{- end }}
              </ul>
              {{- end }}
            </li>
            {{ end }}
          </ul>
        </div>
        <div class="category-multiselect-footer">
          <button type="button" class="btn btn-outline-secondary btn-sm" id="categoryClearBtn">Clear All</button>
        </div>
      </div>
    </div>
  </label>
  {{ end }}
  <label class="form-label fw-bold">Name your entry
    <input type='text' name='name' class='form-control mt-2' required/>
  </label>
  <label class="form-label fw-bold">Research Organization Registry (ROR)
    <small class="form-text text-muted">Optional. Start typing to search for institutions. <a href="https://ror.org/"
                                                                                              target="_blank">Learn more
      about ROR</a></small>

    <!-- Selected ROR organizations display -->
    <div id="selected-rors-upload" class="mb-2 mt-2"></div>

    <!-- Search input -->
    <div class="position-relative mt-2">
      <input type='text' id='ror-search-input-upload' class='form-control' placeholder='Search for institutions...'
             autocomplete="off"/>
      <div id="ror-search-results-upload" class="list-group position-absolute w-100 d-none"></div>
    </div>

    <!-- Hidden input to store ROR IDs -->
    <input type='hidden' name='rors' id='rors-hidden-input-upload' value=''/>
  </label>
  <label class="form-label fw-bold">Upload .eln file
    <input type='file' name='file' class='form-control' accept=".eln" required/>
  </label>
  <div class="form-check mt-3">
    <input class="form-check-input" type="checkbox" id="licenseAgreement" required>
    <label class="form-check-label" for="licenseAgreement">
      I agree to license this entry under <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener noreferrer">Creative Commons Attribution 4.0 International (CC BY 4.0)</a>
    </label>
  </div>
  <button type='submit' id='submitBtn' class='btn btn-primary mt-3'>
    <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
    <span class="btn-text">Send</span>
  </button>
</form>
{{ end }}
