{{ define "content" }}
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="successToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <strong class="me-auto text-success">Success</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body">
        Your entry has been successfully uploaded!
      </div>
    </div>
    <div id="errorToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <strong class="me-auto text-danger">Error</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div class="toast-body" id="errorToastBody">
        Upload failed. Please try again.
      </div>
    </div>
  </div>
  <h1>Upload an Entry</h1>
  <p>Share your ELN archives: experiments, protocols, templates, resources...</p>
  <form method='post' action='/api/v1/records' enctype='multipart/form-data'>
    {{ if .Categories }}
    <label class="form-label fw-bold">Select a category
      <select name="category" class="form-control mt-2" required>
        <option value="">Choose a category...</option>
        {{ range .Categories }}
        <option value="{{ .Id }}">{{ .Name }}</option>
        {{ end }}
      </select>
    </label>
    {{ end }}
    <label class="form-label fw-bold">Name your entry
      <input type='text' name='name' class='form-control mt-2' required />
    </label>
    <label class="form-label fw-bold">Research Organization Registry (ROR)
      <small class="form-text text-muted">Optional. Start typing to search for institutions. <a href="https://ror.org/" target="_blank">Learn more about ROR</a></small>
      
      <!-- Selected ROR organizations display -->
      <div id="selected-rors-upload" class="mb-2 mt-2"></div>
      
      <!-- Search input -->
      <div class="position-relative mt-2">
        <input type='text' id='ror-search-input-upload' class='form-control' placeholder='Search for institutions...' autocomplete="off" />
        <div id="ror-search-results-upload" class="list-group position-absolute w-100 d-none"></div>
      </div>
      
      <!-- Hidden input to store ROR IDs -->
      <input type='hidden' name='rors' id='rors-hidden-input-upload' value='' />
    </label>
    <label class="form-label fw-bold">Upload .eln file
      <input type='file' name='file' class='form-control' accept=".eln" required />
    </label>
    <button type='submit' id='submitBtn' class='btn btn-primary'>
      <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
      <span class="btn-text">Send</span>
    </button>
  </form>
{{ end }}
